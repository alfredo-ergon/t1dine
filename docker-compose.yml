services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: t1dine
      POSTGRES_PASSWORD: local-only-change-me
      POSTGRES_DB: t1dine
    ports:
      - "5432:5432"
    volumes:
      - t1dine-postgres:/var/lib/postgresql/data
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
volumes:
  t1dine-postgres:
