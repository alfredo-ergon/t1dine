name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Core contract packages)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit and contract tests
        run: pnpm test

      - name: Dose-engine isolation guard
        run: pnpm boundaries

      - name: Repository validation
        run: pnpm validate

      # Non-blocking: the frozen deterministic dose engine has a known strict-type
      # defect (number|null not narrowed) that must be fixed under clinical
      # change-control, not in an ordinary change. Surfaced here, tracked as
      # SAFE-003 in docs/delivery/traceability.csv, but does not gate Core CI.
      - name: Dose-engine strict typecheck (known-failing, informational)
        continue-on-error: true
        run: pnpm typecheck:dose-engine
