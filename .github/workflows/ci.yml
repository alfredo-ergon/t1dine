name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Core contract packages)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit and contract tests
        run: pnpm test

      - name: Food-ingestion Python tests (PortFIR adapter)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e services/food-ingestion pytest
          python -m pytest services/food-ingestion -q

      - name: Dose-engine isolation guard
        run: pnpm boundaries

      - name: Repository validation
        run: pnpm validate

      # The deterministic dose engine (unreleased-0.2) now passes strict typecheck
      # and is unit-tested (SAFE-002/003/004 VERIFIED). This is a required gate.
      - name: Dose-engine strict typecheck
        run: pnpm typecheck:dose-engine
